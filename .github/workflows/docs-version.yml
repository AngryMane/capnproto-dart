name: Snapshot and deploy versioned docs

# Triggered by pushing a `vX.Y.Z` tag. Freezes the current state of all 4 docs sections
# (see ci/version-docs.sh) under that version number, commits the snapshot onto main,
# then deploys. The commit is pushed with the default GITHUB_TOKEN, which deliberately
# does not retrigger other workflows' `on: push` — so the deploy step below explicitly
# calls docs-deploy.yml rather than relying on docs.yml's push-to-main trigger to fire.

on:
  push:
    tags:
      - 'v*'

jobs:
  version:
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Snapshot docs for this version
        run: |
          version="${GITHUB_REF_NAME#v}"
          ci/version-docs.sh "$version"

      - name: Commit and push snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add website
          if git diff --cached --quiet; then
            echo "No doc changes to snapshot for ${GITHUB_REF_NAME}."
          else
            git commit -m "docs: snapshot ${GITHUB_REF_NAME} documentation"
            git push origin HEAD:main
          fi

  deploy:
    needs: version
    uses: ./.github/workflows/docs-deploy.yml
    permissions:
      contents: read
      pages: write
      id-token: write
