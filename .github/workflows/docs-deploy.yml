name: Build and deploy docs site

# Reusable workflow: builds website/ and publishes it to GitHub Pages. Called by
# docs.yml (on every push to main that touches docs content) and by docs-version.yml
# (after a tagged release's doc snapshot has been committed to main). Kept as a single
# workflow_call target so the build/deploy steps aren't duplicated between the two
# trigger paths.

on:
  workflow_call:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one concurrent deployment; let in-progress runs finish rather than
# cancelling them mid-publish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install dependencies
        working-directory: website
        run: npm ci

      - name: Build
        working-directory: website
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: website/build

  deploy:
    needs: build
    runs-on: ubuntu-24.04
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
