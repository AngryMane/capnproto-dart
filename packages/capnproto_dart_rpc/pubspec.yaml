name: capnproto_dart_rpc
description: Cap'n Proto RPC (Level 1) support for Dart, built on capnproto_dart.
version: 0.1.0
publish_to: none # TODO: remove once ready to publish to pub.dev.
repository: https://github.com/AngryMane/capnproto-dart
issue_tracker: https://github.com/AngryMane/capnproto-dart/issues
documentation: https://angrymane.github.io/capnproto-dart/
topics: [capnproto, rpc, networking]

resolution: workspace

environment:
  sdk: ^3.7.2

dependencies:
  capnproto_dart:
    git:
      url: https://github.com/AngryMane/capnproto-dart.git
      path: packages/capnproto_dart

dev_dependencies:
  lints: ^5.0.0
  test: ^1.24.0
